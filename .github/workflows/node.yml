name: Build

on: 
  push: 
    tags:
      - '*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: npm install -g typescript
      - run: npm install
      - run: tsc
      - run: npm run test
      - run: npm publish --access public
